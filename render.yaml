services:
  - type: web
    name: jarvis-web
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_LIVEKIT_ROOM
        value: jarvis-room
      - key: VITE_VOICE_LABEL
        value: CUSTOM JARVIS VOICE

  - type: web
    name: jarvis-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8787
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false

  - type: web
    name: jarvis-voice
    runtime: docker
    dockerfilePath: ./voice_service/Dockerfile
    autoDeploy: true
    envVars:
      - key: XTTS_MODEL
        value: tts_models/multilingual/multi-dataset/xtts_v2
      - key: CUSTOM_VOICE_LANG
        value: es
      - key: CUSTOM_VOICE_WAV_URL
        sync: false
      - key: COQUI_TOS_AGREED
        value: "1"

  - type: worker
    name: jarvis-agent
    runtime: docker
    dockerfilePath: ./agent/Dockerfile
    autoDeploy: true
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
      - key: N8N_RESPONSE_FIELD
        value: output
      - key: VOICE_MODE
        value: free
      - key: FREE_STT_MODEL
        value: deepgram/nova-3:multi
      - key: FREE_LLM_MODEL
        value: openai/gpt-4o-mini
      - key: FREE_TTS_MODEL
        value: cartesia/sonic-3:9626c31c-bec5-4cca-baa8-f8ba9e84c8bc
      - key: VOICE_SERVICE_URL
        sync: false
      - key: CUSTOM_VOICE_LANG
        value: es
      - key: CUSTOM_VOICE_WAV_URL
        sync: false
      - key: AGENT_SYSTEM_PROMPT_FILE
        value: agent/system_prompt_es.md
